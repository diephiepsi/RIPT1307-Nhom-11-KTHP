[build]
  command = "yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Proxy API sang Railway — PHẢI đặt TRƯỚC rule /* 
[[redirects]]
  from = "/api/*"
  to = "https://test-production-6aac.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — redirect mọi URL còn lại về index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200